version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowrex-postgres
    environment:
      POSTGRES_USER: flowrex
      POSTGRES_PASSWORD: flowrex
      POSTGRES_DB: flowrex_algo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowrex"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: flowrex-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://flowrex:flowrex@postgres:5432/flowrex_algo
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      DEBUG: ${DEBUG:-true}
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ml_models:/app/data/ml_models
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    container_name: flowrex-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  ml_models:
