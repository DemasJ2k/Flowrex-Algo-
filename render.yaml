databases:
  - name: flowrex-algo-db
    plan: free
    databaseName: flowrex_algo
    user: flowrex

services:
  - type: web
    name: flowrex-algo-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowrex-algo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: '["https://flowrex-algo-web.onrender.com"]'

  - type: web
    name: flowrex-algo-web
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://flowrex-algo-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://flowrex-algo-api.onrender.com/ws
